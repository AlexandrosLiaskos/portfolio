{% import "components/navbar.html" as nav %}
{% import "components/sidebar.html" as side %}
{% import "components/footer.html" as foot %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <meta name="supported-color-schemes" content="light dark">
        <title>{% block title %}Personal Portfolio{% endblock %}</title>
        
        <!-- Resource hints -->
        <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        
        <!-- External CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.11.0/css/flag-icons.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        
        <!-- Internal CSS -->
        <link rel="stylesheet" href="{{ base_path }}/static/css/utils/variables.css">
        <link rel="stylesheet" href="{{ base_path }}/static/css/utils/base.css">
        <link rel="stylesheet" href="{{ base_path }}/static/css/utils/background.css">
        <link rel="stylesheet" href="{{ base_path }}/static/css/components/animations.css">
        <link rel="stylesheet" href="{{ base_path }}/static/css/components/sidebar.css">
        <link rel="stylesheet" href="{{ base_path }}/static/css/components/aceternity.css">
        
        <script>
            // Initialize navItems before Alpine loads
            window.navItems = [
                {
                    href: '#experience',
                    icon: 'fas fa-briefcase',
                    title: 'Experience',
                    subtitle: 'Professional Journey'
                },
                {
                    href: '#education',
                    icon: 'fas fa-graduation-cap',
                    title: 'Education',
                    subtitle: 'Academic Background'
                },
                {
                    href: '#publications',
                    icon: 'fas fa-book',
                    title: 'Publications',
                    subtitle: 'Research Work'
                },
                {
                    href: '#skills',
                    icon: 'fas fa-code',
                    title: 'Skills',
                    subtitle: 'Technical Expertise'
                },
                {
                    href: '#international',
                    icon: 'fas fa-globe',
                    title: 'International',
                    subtitle: 'Global Experience'
                },
                {
                    href: '#volunteer',
                    icon: 'fas fa-hands-helping',
                    title: 'Volunteer',
                    subtitle: 'Community Work'
                }
            ];
        </script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <script type="module" src="{{ base_path }}/static/js/main.js"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        animation: {
                            'fade-in': 'fadeIn 0.5s ease-out forwards',
                            'slide-in': 'slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                            'slide-up': 'slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                            'slide-in-sidebar': 'slideInSidebar 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        }
                    }
                }
            }
        </script>
        <style>
            /* Add these metallic text styles */
            .metallic-text-rose {
                background: linear-gradient(
                    45deg,
                    #FFD700,
                    #FFA07A,
                    #CD7F32,
                    #DAA520
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: brightness(1.3) contrast(1.4) saturate(1.2);
            }

            .metallic-text-teal {
                background: linear-gradient(
                    45deg,
                    #00FFFF,
                    #00CED1,
                    #20B2AA,
                    #00FFFF
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: brightness(1.3) contrast(1.4) saturate(1.2);
            }

            .metallic-text-magenta {
                background: linear-gradient(
                    45deg,
                    #FF69B4,
                    #FF1493,
                    #C71585,
                    #FF69B4
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: brightness(1.3) contrast(1.4) saturate(1.2);
            }
            body {
                background: linear-gradient(
                    165deg,
                    rgba(10, 10, 27, 0.35),
                    rgba(0, 20, 40, 0.40)
                ),
                url('{{ base_path }}/static/img_background.jpg');
                background-position: center center;
                background-size: cover;
                background-attachment: fixed;
                background-repeat: no-repeat;
                min-height: 100vh;
                width: 100%;
            }

            /* Vignette effect */
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: radial-gradient(
                    circle at center,
                    transparent 0%,
                    rgba(0, 0, 0, 0.4) 50%,
                    rgba(0, 0, 0, 0.7) 100%
                );
                pointer-events: none;
                z-index: 1;
            }

            /* Update component background colors */
            .bg-black\/20 {
                background-color: rgba(0, 0, 0, 0.7) !important;
            }

            /* Navbar specific overlay */
            nav.bg-black\/20 {
                background-color: rgba(0, 0, 0, 0.7) !important;
            }

            /* Sidebar specific overlay */
            aside.bg-black\/20 {
                background-color: rgba(0, 0, 0, 0.3) !important;
            }

            /* Footer specific overlay */
            footer .bg-black\/20 {
                background-color: rgba(0, 0, 0, 0.5) !important;
            }

            /* Fallback background color */
            @supports not (background-attachment: fixed) {
                body {
                    background-color: #0e202d;
                }
            }
        </style>
        <script src="https://unpkg.com/@floating-ui/core@1.5.0"></script>
        <script src="https://unpkg.com/@floating-ui/dom@1.5.0"></script>
        <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    </head>
    <body class="font-poppins leading-relaxed text-white min-h-screen relative antialiased">
        <!-- Dark overlay -->
        <div id="darkOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-300 z-40 opacity-0 invisible"></div>

        <!-- Main layout wrapper -->
        <div class="flex min-h-screen flex-col">
            {{ nav::navbar() }}
            
            <!-- Content wrapper with sidebar -->
            <div class="flex flex-1 relative pt-14">
                <!-- Desktop Sidebar -->
                {{ side::sidebar() }}
                
                <!-- Main content area -->
                <main class="flex-1 w-full transition-all duration-500 ease-out">
                    <div class="w-full">
                        <div class="space-y-24">
                            {% block content %}{% endblock %}
                        </div>
                    </div>
                </main>
            </div>
            
            {{ foot::footer() }}
        </div>
    </body>
</html>

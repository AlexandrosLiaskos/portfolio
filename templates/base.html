{% import "components/navbar.html" as nav %}
{% import "components/sidebar.html" as side %}
{% import "components/footer.html" as foot %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <meta name="supported-color-schemes" content="light dark">
        <title>{% block title %}Personal Portfolio{% endblock %}</title>
        
        <!-- Resource hints -->
        <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        
        <!-- External CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.11.0/css/flag-icons.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        
        <!-- Internal CSS -->
        <link rel="stylesheet" href="/static/css/utils/variables.css">
        <link rel="stylesheet" href="/static/css/utils/base.css">
        <link rel="stylesheet" href="/static/css/utils/background.css">
        <link rel="stylesheet" href="/static/css/components/animations.css">
        <link rel="stylesheet" href="/static/css/components/sidebar.css">
        
        <script>
            // Initialize navItems before Alpine loads
            window.navItems = [
                {
                    href: '#experience',
                    icon: 'fas fa-briefcase',
                    title: 'Experience',
                    subtitle: 'Professional Journey'
                },
                {
                    href: '#education',
                    icon: 'fas fa-graduation-cap',
                    title: 'Education',
                    subtitle: 'Academic Background'
                },
                {
                    href: '#publications',
                    icon: 'fas fa-book',
                    title: 'Publications',
                    subtitle: 'Research Work'
                },
                {
                    href: '#skills',
                    icon: 'fas fa-code',
                    title: 'Skills',
                    subtitle: 'Technical Expertise'
                },
                {
                    href: '#international',
                    icon: 'fas fa-globe',
                    title: 'International',
                    subtitle: 'Global Experience'
                },
                {
                    href: '#volunteer',
                    icon: 'fas fa-hands-helping',
                    title: 'Volunteer',
                    subtitle: 'Community Work'
                }
            ];
        </script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <script type="module" src="/static/js/main.js"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        animation: {
                            'fade-in': 'fadeIn 0.5s ease-out forwards',
                            'slide-in': 'slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                            'slide-up': 'slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                            'slide-in-sidebar': 'slideInSidebar 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        }
                    }
                }
            }
        </script>
        <style>                                                                                                                                                     
            /* Neon button styles */
            .neon-button-cyan {
                background-color: #00ffeaba;
                color: #000000;
                font-weight: 900;
                transition: all 0.3s ease;
            }

            .neon-button-magenta {
                background-color: #cc00ffc1;
                color: #000000;
                font-weight: 900;
                transition: all 0.3s ease;
            }

            .neon-text-glow {
                text-shadow: 0 0 8px currentColor;
            }
        </style>
    </head>
    <body class="font-poppins leading-relaxed text-white min-h-screen relative antialiased">
        <!-- Dark overlay -->
        <div id="darkOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-300 z-40 opacity-0 invisible"></div>

        <!-- Main layout wrapper -->
        <div class="flex min-h-screen flex-col">
            {{ nav::navbar() }}
            
            <!-- Content wrapper with sidebar -->
            <div class="flex flex-1 relative pt-14">
                <!-- Desktop Sidebar -->
                {{ side::sidebar() }}
                
                <!-- Main content area -->
                <main class="flex-1 w-full transition-all duration-500 ease-out">
                    <div class="container mx-auto px-4 py-6 max-w-5xl">
                        <div class="space-y-24">
                            {% block content %}{% endblock %}
                        </div>
                    </div>
                </main>
            </div>
            
            {{ foot::footer() }}
        </div>
    </body>
</html>

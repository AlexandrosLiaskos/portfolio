{% macro navbar() %}
<nav class="fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
        <div class="bg-black/20 backdrop-blur-sm rounded-2xl
                    border border-[#00FFEA]/10 overflow-hidden
                    shadow-lg transform-gpu
                    h-14 my-2">
            <!-- Window Header - Darker background -->
            <div class="absolute inset-x-0 top-0 h-full bg-black/40">
                <div class="flex justify-between h-full px-6 items-center">
                    <!-- Logo -->
                    <a href="/" class="flex items-center">
                        <span class="metallic-text-teal font-bold text-base">liaskos.rs</span>
                    </a>

                    <!-- Desktop Navigation -->
                    <div class="hidden md:flex items-center space-x-4">
                        <a href="#experience" 
                           class="nav-link text-sm metallic-text-teal
                                  transition-colors duration-300">Experience</a>
                        <a href="#education" 
                           class="nav-link text-sm metallic-text-teal
                                  transition-colors duration-300">Education</a>
                        <a href="#publications" 
                           class="nav-link text-sm metallic-text-teal
                                  transition-colors duration-300">Publications</a>
                        <a href="#skills" 
                           class="nav-link text-sm metallic-text-teal
                                  transition-colors duration-300">Skills</a>
                        <a href="{{ base_path }}/static/CV_LIASKOS_24.pdf" 
                           class="bg-black/20 metallic-text-teal px-3 py-1 rounded-lg border border-[#00FFEA]/20 
                                  hover:bg-[#00FFEA]/10 transition-all duration-300 ease-out
                                  flex items-center gap-1.5 text-xs backdrop-blur-sm">
                            <i class="fas fa-download text-[10px] metallic-text-teal"></i>
                            <span>CV</span>
                        </a>
                    </div>

                    <!-- Mobile menu button -->
                    <button id="menuButton" class="md:hidden p-2">
                        <i class="fas fa-bars metallic-text-teal"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>
{% endmacro %}

{% macro footer() %}
<footer class="relative z-40 mt-auto">
    <div class="h-24"></div>
    <div class="max-w-5xl mx-auto px-4">
        <div class="bg-[rgb(10,10,27)]/90 backdrop-blur-xl 
                    border border-white/10 rounded-t-2xl
                    shadow-lg transform-gpu
                    h-12 mb-2">
            <div class="h-full flex items-center justify-between px-6">
                <div class="flex gap-3 items-center">
                    <a href="https://github.com/yourusername" 
                       class="text-primary text-lg opacity-80 hover:opacity-100 
                              hover:-translate-y-0.5 transition-all duration-300" 
                       target="_blank">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://linkedin.com/in/yourusername" 
                       class="text-primary text-lg opacity-80 hover:opacity-100 
                              hover:-translate-y-0.5 transition-all duration-300" 
                       target="_blank">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </div>
                <p class="text-xs text-white/60">&copy; 2024 Alexandros P. Liaskos</p>
            </div>
        </div>
    </div>
</footer>
{% endmacro %}

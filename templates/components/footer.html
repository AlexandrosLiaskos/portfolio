{% macro footer() %}
<footer class="relative z-40 mt-auto">
    <div class="h-24"></div>
    <div class="max-w-7xl mx-auto px-4">
        <div class="bg-black/20 backdrop-blur-sm 
                    border border-[#00FFEA]/10 rounded-t-2xl
                    shadow-lg transform-gpu
                    h-10 mb-2">
            <div class="h-full flex items-center justify-between px-6 -ml-20">
                <div class="flex gap-3 items-center ml-24">
                    <a href="https://github.com/yourusername" 
                       class="text-[#00FFEA] text-base opacity-80 hover:opacity-100 
                              hover:-translate-y-0.5 transition-all duration-300" 
                       target="_blank">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://linkedin.com/in/yourusername" 
                       class="text-[#00FFEA] text-base opacity-80 hover:opacity-100 
                              hover:-translate-y-0.5 transition-all duration-300" 
                       target="_blank">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </div>
                <p class="text-[10px] text-white/60">&copy; 2024 Alexandros P. Liaskos</p>
            </div>
        </div>
    </div>
</footer>
{% endmacro %}

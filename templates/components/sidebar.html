{% macro sidebar() %}
<aside id="desktopSidebar" 
       class="fixed top-20 left-4 w-72 
              bg-[rgb(10,10,27)]/95
              border border-white/10 rounded-2xl
              transform -translate-x-full
              transition-all duration-500 ease-out z-40
              shadow-lg
              invisible
              flex flex-col
              overflow-hidden
              pointer-events-none
              group/sidebar">
    
    <!-- Enhanced Profile Section -->
    <div class="relative p-6 border-b border-white/10 
                bg-gradient-to-br from-[rgb(10,10,27)]/80 to-black/50
                opacity-0 transition-all duration-500 delay-100
                group-[.visible]/sidebar:opacity-100"
         x-data="{ showBio: false }">
        <!-- Decorative Elements -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -mr-16 -mt-16"></div>
        <div class="absolute bottom-0 left-0 w-24 h-24 bg-primary/10 rounded-full blur-2xl -ml-12 -mb-12"></div>
        
        <!-- Profile Image Container -->
        <div class="relative w-24 h-24 mx-auto mb-4 group/image"
             @mouseenter="showBio = true"
             @mouseleave="showBio = false">
            <!-- Profile Image -->
            <div class="relative w-full h-full rounded-xl overflow-hidden 
                        ring-2 ring-primary/10 ring-offset-2 ring-offset-[rgb(10,10,27)]
                        transform scale-95 opacity-0 transition-all duration-500 delay-200
                        group-[.visible]/sidebar:scale-100 group-[.visible]/sidebar:opacity-100
                        group-hover/image:scale-105 group-hover/image:ring-primary/30
                        shadow-lg shadow-primary/5">
                <img src="/static/profile.jpg" alt="Profile" 
                     class="w-full h-full object-cover transition-all duration-500
                            group-hover/image:scale-110 group-hover/image:rotate-3">
                
                <!-- Hover Overlay -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent 
                           opacity-0 group-hover/image:opacity-100 transition-opacity duration-300">
                </div>
            </div>
            
            <!-- Status Indicator -->
            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-primary/20 rounded-full p-0.5
                        ring-2 ring-[rgb(10,10,27)] animate-pulse">
                <div class="w-full h-full bg-primary rounded-full"></div>
            </div>
        </div>
        
        <!-- Profile Info -->
        <div class="relative text-center space-y-2 transform -translate-y-4 opacity-0 
                    transition-all duration-500 delay-300
                    group-[.visible]/sidebar:translate-y-0 group-[.visible]/sidebar:opacity-100">
            <h2 class="text-lg font-semibold text-primary tracking-wide
                       hover:text-primary/90 transition-colors duration-300">
                Alexandros P. Liaskos
            </h2>
            
            <div class="flex flex-col gap-1">
                <div class="flex items-center justify-center gap-2 text-sm text-white/80">
                    <i class="fas fa-code text-primary/70"></i>
                    <span>Software Developer</span>
                </div>
                <div class="flex items-center justify-center gap-2 text-sm text-white/60">
                    <i class="fas fa-globe text-primary/50"></i>
                    <span>Geospatial Analyst</span>
                </div>
            </div>
            
            <!-- Quick Stats -->
            <div class="flex justify-center gap-4 mt-3 pt-2 border-t border-white/5">
                <div class="text-center">
                    <div class="text-xs text-white/50">Exp Yrs</div>
                    <div class="text-sm font-medium text-primary">4+</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-white/50">Projects</div>
                    <div class="text-sm font-medium text-primary">15+</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-white/50">Publications</div>
                    <div class="text-sm font-medium text-primary">3+</div>
                </div>
            </div>
        </div>
        
        <!-- Bio Popup -->
        <div x-show="showBio"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 transform -translate-y-2"
             x-transition:enter-end="opacity-100 transform translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 transform translate-y-0"
             x-transition:leave-end="opacity-0 transform -translate-y-2"
             class="absolute top-32 left-1/2 -translate-x-1/2 w-64 p-3 
                    bg-black/90 backdrop-blur-lg rounded-lg border border-primary/20
                    shadow-xl shadow-primary/5 z-50">
            <p class="text-xs text-white/70 leading-relaxed">
                Passionate about combining software development with geospatial analysis 
                to create innovative solutions. Specialized in Rust, Python, and GIS technologies.
            </p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2 overflow-y-auto scrollbar-thin scrollbar-track-white/5 scrollbar-thumb-primary/20"
         x-data="{ navItems: window.navItems || [] }">
        <div class="space-y-2">
            <template x-for="(item, index) in navItems" :key="item.href">
                <a :href="item.href" 
                   class="group flex items-center gap-3 p-3 rounded-xl 
                          nav-item
                          transform translate-x-4 opacity-0
                          hover:bg-white/5 hover:-translate-y-0.5 hover:shadow-lg
                          bg-black/20
                          relative overflow-hidden
                          transition-all duration-300 ease-out
                          group-[.visible]/sidebar:translate-x-0 group-[.visible]/sidebar:opacity-100"
                   :style="`transition-delay: ${300 + (index * 50)}ms`">
                    
                    <div class="absolute inset-0 bg-gradient-to-r from-primary/10 via-primary/5 to-transparent 
                               opacity-0 group-hover:opacity-100 transition-all duration-500"></div>
                    
                    <div class="w-9 h-9 rounded-xl bg-white/5 
                               flex items-center justify-center
                               group-hover:bg-primary/20 transition-all duration-300
                               relative z-10">
                        <i :class="[item.icon, 'text-primary']"></i>
                    </div>
                    
                    <div class="flex flex-col relative z-10">
                        <span class="text-sm font-medium text-white/90 
                                   group-hover:text-primary transition-colors"
                              x-text="item.title"></span>
                        <span class="text-xs text-white/50" 
                              x-text="item.subtitle"></span>
                    </div>
                </a>
            </template>
        </div>
    </nav>

    <!-- Social Links -->
    <div class="p-4 border-t border-white/10 
                bg-gradient-to-b from-black/20 to-[rgb(10,10,27)]/80
                transform translate-y-4 opacity-0 transition-all duration-500 delay-700
                group-[.visible]/sidebar:translate-y-0 group-[.visible]/sidebar:opacity-100">
        <div class="flex justify-center gap-3">
            <a href="https://github.com/yourusername" 
               target="_blank" 
               rel="noopener noreferrer"
               class="w-10 h-10 rounded-xl bg-white/5 
                      flex items-center justify-center
                      hover:bg-primary/20 transition-all duration-300 
                      hover:-translate-y-1 hover:scale-110
                      relative overflow-hidden group">
                <i class="fab fa-github text-primary text-lg
                         group-hover:scale-110 transition-transform duration-300"></i>
            </a>
        </div>
    </div>
</aside>
{% endmacro %}

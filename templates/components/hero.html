{% macro hero() %}
<section class="min-h-[calc(100vh-var(--navbar-height)-6rem)] w-full relative overflow-hidden">
    <!-- Main Content -->
    <div class="relative z-10 w-full h-full">
        <div class="flex flex-col h-full justify-center">
            <!-- Content Column - Fixed to left -->
            <div class="w-full space-y-12 pl-32"> <!-- Increased spacing between sections -->
                <!-- Name and Title Section -->
                <div class="space-y-4">
                    <h1 class="text-[clamp(2.5rem,5vw,4rem)] font-bold leading-none">
                        <span class="text-[#00FFEA] relative"
                              data-text="Alexandros P. Liaskos"
                              id="name-typewriter">
                        </span>
                    </h1>
                    
                    <!-- Simple, clean job titles -->
                    <div class="space-y-2">
                        <div class="flex items-center gap-2">
                            <div class="h-[1px] w-8 bg-[#00FFEA]/30"></div>
                            <span class="text-[#00FFEA] text-lg">Software Developer</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="h-[1px] w-8 bg-[#00FFEA]/30"></div>
                            <span class="text-[#00FFEA] text-lg">Geospatial Analyst</span>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats - More minimal design -->
                <div class="flex gap-8 max-w-2xl">
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-bold text-[#00FFEA]">24+</span>
                        <span class="text-xs text-white/50">Years</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-bold text-[#00FFEA]">15+</span>
                        <span class="text-xs text-white/50">Projects</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-bold text-[#00FFEA]">3+</span>
                        <span class="text-xs text-white/50">Publications</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-bold text-[#00FFEA]">2+</span>
                        <span class="text-xs text-white/50">Research</span>
                    </div>
                </div>

                <!-- Code Window -->
                <div class="relative w-[500px]">
                    <div class="bg-black/20 backdrop-blur-sm rounded-2xl 
                                border border-[#00FFEA]/10 overflow-hidden
                                animate-float-slow">
                        <!-- Window Header -->
                        <div class="flex items-center gap-2 p-3 border-b border-[#00FFEA]/10 bg-black/40">
                            <div class="flex space-x-2">
                                <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                                <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                                <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                            </div>
                            <div class="flex items-center ml-4 gap-2">
                                <div class="flex items-center px-2 py-1 rounded-md bg-black/20">
                                    <i class="fas fa-code text-[10px] text-[#00FFEA]/70 mr-2"></i>
                                    <span class="text-xs text-white/50 font-mono">main.rs</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Code Content -->
                        <div class="p-4 font-mono text-sm">
                            <div class="space-y-2 animate-slide-up opacity-0" style="animation-delay: 1s;">
                                <div>
                                    <span class="text-[#FF00FF]">use</span> 
                                    <span class="text-[#00FFEA]">actix_web</span>::*;
                                </div>
                                <div class="mt-4">
                                    <span class="text-[#FF00FF]">async</span> 
                                    <span class="text-[#00FFEA]">fn</span> 
                                    <span class="text-white/90">analyze_data</span>() ->
                                </div>
                                <div class="ml-4">
                                    <span class="text-[#FF00FF]">Result</span>
                                    <span class="text-white/70">&lt;Json&lt;Data&gt;&gt;</span> {
                                </div>
                                <div class="text-white/50 ml-8">
                                    // ...
                                </div>
                                <div class="ml-4">}</div>
                            </div>
                        </div>

                        <!-- Status Bar -->
                        <div class="flex items-center justify-between px-4 py-2 bg-black/40 border-t border-[#00FFEA]/10">
                            <div class="flex items-center gap-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full bg-[#27C93F]"></div>
                                    <span class="text-xs text-white/50">Ready</span>
                                </div>
                                <div class="text-xs text-white/30">Rust 1.75.0</div>
                            </div>
                            <div class="flex items-center gap-2 text-xs text-white/50">
                                <i class="fas fa-circle text-[8px] text-[#00FFEA]"></i>
                                <span>Running</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Minimal CTA Buttons -->
                <div class="flex gap-4">
                    <a href="#experience" 
                       class="px-6 py-2.5 bg-[#00FFEA] rounded-lg text-black/80 
                              font-medium transition-all duration-300
                              hover:shadow-[0_0_20px_rgba(0,255,234,0.3)]">
                        View Portfolio
                    </a>
                    
                    <a href="/static/CV_LIASKOS_24.pdf" 
                       target="_blank"
                       class="px-6 py-2.5 border border-[#00FFEA]/20 rounded-lg 
                              text-[#00FFEA] font-medium transition-all duration-300
                              hover:border-[#00FFEA]/40 hover:bg-[#00FFEA]/5">
                        Download CV
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
</style>
{% endmacro %}

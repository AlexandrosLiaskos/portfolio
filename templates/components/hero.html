{% macro hero() %}
<section class="min-h-[calc(100vh-var(--navbar-height)-6rem)] w-full relative overflow-hidden pt-32">
    <!-- Main Content -->
    <div class="relative z-10 w-full h-full">
        <div class="flex flex-col h-full justify-start">
            <!-- Content Column - Fixed to left -->
            <div class="w-full space-y-12 pl-32"> <!-- Increased spacing between sections -->

                <!-- Availability Banner -->
                <div class="flex items-center gap-2 w-fit px-3 py-1.5 rounded-full 
                            bg-black/20 backdrop-blur-sm
                            transition-all duration-300
                            relative overflow-hidden
                            before:absolute before:inset-0
                            before:bg-gradient-to-r before:from-transparent before:via-[#00FFEA]/10 before:to-transparent
                            before:translate-x-[-200%] before:animate-[shine_3s_infinite]">
                    <div class="flex items-center gap-1.5">
                        <span class="relative flex h-2.5 w-2.5">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#27C93F] opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#27C93F]"></span>
                        </span>
                        <span class="text-white/70 text-xs">Available for</span>
                    </div>
                    <span class="text-[#00FFEA] text-xs font-medium">Projects (Online/Hybrid)</span>
                </div>

                <!-- Code Window -->
                <div class="relative w-[500px]">
                    <div class="bg-black/20 backdrop-blur-sm rounded-2xl 
                                border border-[#00FFEA]/10 overflow-hidden
                                animate-float-slow">
                        <!-- Window Header -->
                        <div class="flex items-center gap-2 p-3 border-b border-[#00FFEA]/10 bg-black/40">
                            <div class="flex space-x-2">
                                <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                                <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                                <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
                            </div>
                            <div class="flex items-center ml-4 gap-2">
                                <div class="flex items-center px-2 py-1 rounded-md bg-black/20">
                                    <i class="fas fa-code text-[10px] text-[#00FFEA]/70 mr-2"></i>
                                    <span class="text-xs text-white/50 font-mono">main.rs</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Code Content -->
                        <div class="p-4 font-mono text-sm">
                            <div class="space-y-1">
                                <div class="flex">
                                    <span class="text-gray-500 w-8 select-none">1</span>
                                    <div class="typewriter-line-1"></div>
                                </div>
                                <div class="flex">
                                    <span class="text-gray-500 w-8 select-none">2</span>
                                    <div class="typewriter-line-2"></div>
                                </div>
                                <div class="flex">
                                    <span class="text-gray-500 w-8 select-none">3</span>
                                    <div class="typewriter-line-3"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Bar -->
                        <div class="flex items-center justify-between px-4 py-2 bg-black/40 border-t border-[#00FFEA]/10">
                            <div class="flex items-center gap-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full bg-[#27C93F]"></div>
                                    <span class="text-xs text-white/50">Ready</span>
                                </div>
                                <div class="text-xs text-white/30">Rust 1.75.0</div>
                            </div>
                            <div class="flex items-center gap-2 text-xs text-white/50">
                                <i class="fas fa-circle text-[8px] text-[#00FFEA]"></i>
                                <span>Running</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats - More minimal design -->
                <div class="flex gap-8 max-w-2xl">
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-[#00FFEA]">24+</span>
                        <span class="text-sm text-white/70">Years</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-[#00FFEA]">15+</span>
                        <span class="text-sm text-white/70">Projects</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-[#00FFEA]">3+</span>
                        <span class="text-sm text-white/70">Publications</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-[#00FFEA]">2+</span>
                        <span class="text-sm text-white/70">Research</span>
                    </div>
                </div>

                <!-- Minimal CTA Buttons -->
                <div class="flex gap-4">
                    <a href="#experience" 
                       class="px-6 py-2.5 bg-[#00FFEA] rounded-lg text-black/80 
                              font-medium transition-all duration-300
                              hover:shadow-[0_0_20px_rgba(0,255,234,0.3)]">
                        View Portfolio
                    </a>
                    
                    <a href="/static/CV_LIASKOS_24.pdf" 
                       target="_blank"
                       class="px-6 py-2.5 border border-[#00FFEA]/20 rounded-lg 
                              text-[#00FFEA] font-medium transition-all duration-300
                              hover:border-[#00FFEA]/40 hover:bg-[#00FFEA]/5
                              bg-black/20 backdrop-blur-sm">
                        Download CV
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

[class^="typewriter-line-"] {
    display: inline-block;
    white-space: pre;
    margin: 0;
    min-height: 1.5em;  /* Ensure consistent line height */
}

@keyframes shine {
    0% {
        transform: translateX(-200%);
    }
    100% {
        transform: translateX(200%);
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const lines = [
        {
            element: '.typewriter-line-1',
            text: '/// Portfolio - v.1.0.0'
        },
        {
            element: '.typewriter-line-2',
            text: '## Alexandros P. Liaskos ##',
            className: 'text-lg'
        },
        {
            element: '.typewriter-line-3',
            text: 'A passionate Developer specializing in Geospatial Analysis'
        }
    ];

    let currentLine = 0;
    
    function formatText(text, className = '') {
        if (text.includes('///')) {
            return `<span class="text-[#00FFEA] ${className}">${text}</span>`;
        } else if (text.includes('##')) {
            return `<span class="text-green-400 ${className}">${text}</span>`;
        } else {
            return `<span class="text-white/70 ${className}">${text}</span>`;
        }
    }
    
    function typeLine(lineIndex) {
        if (lineIndex >= lines.length) return;
        
        const line = lines[lineIndex];
        const element = document.querySelector(line.element);
        let currentChar = 0;
        element.innerHTML = '';
        
        function typeChar() {
            if (currentChar < line.text.length) {
                const currentText = line.text.substring(0, currentChar + 1);
                element.innerHTML = formatText(currentText, line.className || '');
                currentChar++;
                setTimeout(typeChar, 50);
            } else {
                setTimeout(() => typeLine(lineIndex + 1), 200);
            }
        }
        
        typeChar();
    }
    
    setTimeout(() => typeLine(0), 1000);
});
</script>
{% endmacro %}

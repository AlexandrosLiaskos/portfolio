{% macro hero() %}
<section class="min-h-[calc(100vh-var(--navbar-height)-6rem)] w-full relative overflow-hidden" 
         x-data="{ showParticles: false }"
         x-init="setTimeout(() => showParticles = true, 1000)">

    <!-- Main Content -->
    <div class="relative z-10 w-full h-full">
        <div class="flex flex-col h-full justify-center">
            <!-- Content Column - Super extreme left positioning -->
            <div class="w-full space-y-8 max-w-7xl -ml-20">
                <!-- Status Badge -->
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full 
                            bg-black/20 backdrop-blur-sm border border-[#00FFEA]/10
                            text-xs text-white/90 ml-24">
                    <span class="flex items-center gap-2">
                        <i class="fas fa-circle text-[0.5em] text-[#00FFEA] animate-pulse"></i>
                        Available for Projects
                    </span>
                    <span class="text-white/30">•</span>
                    <span class="text-[#00FFEA]">Remote/Hybrid</span>
                </div>

                <!-- Name and Title -->
                <div class="space-y-4 ml-24">
                    <h1 class="text-[clamp(2.5rem,5vw,4rem)] font-bold leading-none">
                        <div class="inline-block px-4 py-2">
                            <span class="text-[#00FFEA]/80" 
                                  data-text="Alexandros P. Liaskos"
                                  id="name-typewriter"></span>
                        </div>
                    </h1>
                    
                    <div class="space-y-2 text-[clamp(1.2rem,2vw,1.5rem)]">
                        <div class="inline-flex items-center gap-3 px-4 py-2">
                            <i class="fas fa-code text-[#FF00FF]/80"></i>
                            <span class="text-[#FF00FF]/80">Software Developer</span>
                        </div>
                        <div class="inline-flex items-center gap-3 px-4 py-2">
                            <i class="fas fa-globe text-[#00FFEA]/80"></i>
                            <span class="text-[#00FFEA]/80">Geospatial Analyst</span>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="grid grid-cols-4 gap-3 max-w-2xl ml-24">
                    <div class="text-center p-3 bg-black/20 backdrop-blur-sm rounded-xl border border-[#00FFEA]/10">
                        <div class="text-2xl font-bold text-[#00FFEA]">4+</div>
                        <div class="text-xs text-white/50">Years Experience</div>
                    </div>
                    <div class="text-center p-3 bg-black/20 backdrop-blur-sm rounded-xl border border-[#FF00FF]/10">
                        <div class="text-2xl font-bold text-[#FF00FF]">15+</div>
                        <div class="text-xs text-white/50">Projects</div>
                    </div>
                    <div class="text-center p-3 bg-black/20 backdrop-blur-sm rounded-xl border border-[#00FFEA]/10">
                        <div class="text-2xl font-bold text-[#00FFEA]">3+</div>
                        <div class="text-xs text-white/50">Publications</div>
                    </div>
                    <div class="text-center p-3 bg-black/20 backdrop-blur-sm rounded-xl border border-[#FF00FF]/10">
                        <div class="text-2xl font-bold text-[#FF00FF]">2+</div>
                        <div class="text-xs text-white/50">Research Positions</div>
                    </div>
                </div>

                <!-- Code Window -->
                <div class="relative w-[500px] mt-8 ml-24">
                    <div class="bg-black/20 backdrop-blur-sm rounded-2xl 
                                border border-[#00FFEA]/10 overflow-hidden
                                animate-float-slow">
                        <!-- Window Header -->
                        <div class="flex items-center gap-2 p-3 border-b border-[#00FFEA]/10">
                            <div class="w-3 h-3 rounded-full bg-[#FF00FF]/30"></div>
                            <div class="w-3 h-3 rounded-full bg-[#00FFEA]/30"></div>
                            <div class="w-3 h-3 rounded-full bg-white/30"></div>
                            <span class="ml-2 text-xs text-white/50">main.rs</span>
                        </div>
                        
                        <!-- Code Content -->
                        <div class="p-4 font-mono text-xs">
                            <div class="space-y-2 animate-slide-up opacity-0" style="animation-delay: 1s;">
                                <div>
                                    <span class="text-[#FF00FF]">use</span> 
                                    <span class="text-[#00FFEA]">actix_web</span>::*;
                                </div>
                                <div class="mt-4">
                                    <span class="text-[#FF00FF]">async</span> 
                                    <span class="text-[#00FFEA]">fn</span> 
                                    <span class="text-white/90">analyze_data</span>() ->
                                </div>
                                <div class="ml-4">
                                    <span class="text-[#FF00FF]">Result</span>
                                    <span class="text-white/70">&lt;Json&lt;Data&gt;&gt;</span> {
                                </div>
                                <div class="text-white/50 ml-8">
                                    // ...
                                </div>
                                <div class="ml-4">}</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- CTA Buttons -->
                <div class="flex flex-wrap gap-6 ml-24">
                    <a href="#experience" 
                       class="neon-button-cyan px-6 py-3 rounded-full text-[#00FFEA]/80 text-base backdrop-blur-sm bg-black/10 hover:bg-black/20 transition-all">
                        <span class="flex items-center gap-2">
                            <i class="fas fa-briefcase"></i>
                            View Portfolio
                        </span>
                    </a>
                    
                    <a href="/static/CV_LIASKOS_24.pdf" 
                       target="_blank"
                       class="neon-button-magenta px-6 py-3 rounded-full text-[#FF00FF]/80 text-base backdrop-blur-lg bg-black/20 hover:bg-black/30 transition-all">
                        <span class="flex items-center gap-2">
                            <i class="fas fa-download"></i>
                            Download CV
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
@keyframes move-bg {
    from { background-position: 0 0; }
    to { background-position: 40px 70px; }
}

@keyframes fadeOutSlow {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
}

@keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 0.8; }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
</style>
{% endmacro %}

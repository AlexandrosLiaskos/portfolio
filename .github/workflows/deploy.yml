name: Deploy Rust Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BASE_PATH: '/${{ github.event.repository.name }}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Setup Pages
        uses: actions/configure-pages@v3
        id: pages
        with:
          enablement: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build Site
        run: |
          # First build the Rust project
          cargo build --release
          
          # Create dist directory
          mkdir -p dist
          
          # Generate the HTML file
          cargo run --release -- --static
          
          # Create static directory structure in dist
          mkdir -p dist/static/js/components
          mkdir -p dist/static/js/modules
          mkdir -p dist/static/css/components
          mkdir -p dist/static/css/utils
          mkdir -p dist/static/img
          
          # Copy all static assets with proper directory structure
          cp -r static/js/components/* dist/static/js/components/
          cp -r static/js/modules/* dist/static/js/modules/
          cp -r static/js/main.js dist/static/js/
          cp -r static/css/components/* dist/static/css/components/
          cp -r static/css/utils/* dist/static/css/utils/
          cp -r static/*.jpg dist/static/
          cp -r static/*.png dist/static/
          cp -r static/*.pdf dist/static/
          
          # Create .nojekyll file
          touch dist/.nojekyll
          
          # Debug: List contents
          echo "Final dist/ contents:"
          ls -la dist/
          echo "Static directory contents:"
          ls -la dist/static/
          echo "JS directory contents:"
          ls -la dist/static/js/
          echo "CSS directory contents:"
          ls -la dist/static/css/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

name: Deploy Rust Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Add this for proper base path
  BASE_PATH: '/${{ github.event.repository.name }}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Setup Pages
        uses: actions/configure-pages@v3
        # Add id to reference the output
        id: pages
        with:
          # Enable this if you want to force enable Pages
          enablement: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build Site
        run: |
          cargo build --release
          mkdir -p dist
          cp -r static dist/
          cp -r templates dist/
          touch dist/.nojekyll
          # Optional: Add a basic index.html if needed
          echo "<meta http-equiv='refresh' content='0;url=$BASE_PATH/index.html'>" > dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

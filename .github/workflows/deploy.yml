name: Deploy Rust Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BASE_PATH: '/${{ github.event.repository.name }}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Setup Pages
        uses: actions/configure-pages@v3
        id: pages
        with:
          enablement: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build Site
        run: |
          # First build the Rust project
          cargo build --release
          
          # Create dist directory
          mkdir -p dist
          
          # Generate the HTML file
          cargo run --release -- --static
          
          # Copy all static assets AFTER generating HTML
          cp -r static/* dist/
          cp -r templates dist/
          
          # Ensure index.html is in the right place
          if [ ! -f "dist/index.html" ]; then
            echo "Moving index.html to dist/"
            mv templates/index.html dist/ || true
          fi
          
          # Create .nojekyll file
          touch dist/.nojekyll
          
          # Debug: List contents
          echo "Final dist/ contents:"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

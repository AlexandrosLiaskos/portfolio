name: Deploy Rust Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BASE_PATH: '/${{ github.event.repository.name }}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Setup Pages
        uses: actions/configure-pages@v3
        id: pages
        with:
          enablement: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build Site
        run: |
          # First build the Rust project
          cargo build --release
          
          # Create dist directory and its structure
          mkdir -p dist/static
          mkdir -p dist/static/css/utils
          mkdir -p dist/static/css/components
          mkdir -p dist/static/js/components
          mkdir -p dist/static/js/modules
          
          # Generate the HTML and CSS files
          cargo run --release -- --static
          
          # Copy all static assets
          cp -r static/* dist/static/
          
          # Copy background image specifically
          if [ -f "static/img_background.jpg" ]; then
            echo "Copying background image..."
            cp static/img_background.jpg dist/static/
          else
            echo "Warning: Background image not found!"
            ls -la static/
          fi
          
          # Create .nojekyll file
          touch dist/.nojekyll
          
          # Debug output
          echo "=== Directory Structure ==="
          find dist -type f
          
          echo "=== CSS Directory ==="
          ls -la dist/static/css/utils/
          
          echo "=== Static Directory ==="
          ls -la dist/static/
          
          echo "=== Background CSS Contents ==="
          cat dist/static/css/utils/background.css
          
          echo "=== Image Files ==="
          find dist/static -type f -name "*.jpg" -o -name "*.png"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
